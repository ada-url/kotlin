name: Release

on:
  workflow_dispatch:
    inputs:
      publish-tag:
        description: 'The tag of the version to publish (e.g. v0.1.0)'
        required: true
        type: string

concurrency:
  group: release

jobs:
  # ── 1. Run the full test suite on every platform first ──────────────────────
  test-release:
    name: Test release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test-task: linuxX64Test
          - os: macos-15
            test-task: macosArm64Test
          - os: windows-latest
            test-task: mingwX64Test
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Konan toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install mingw C++20 toolchain (Windows)
        if: runner.os == 'Windows'
        run: C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-gcc

      - name: Run tests
        run: gradle ${{ matrix.test-task }}

  # ── 2. Bump version, tag, and push ──────────────────────────────────────────
  bump-version:
    name: Bump version & tag
    needs: test-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Update version in build.gradle.kts
        env:
          NEW_VERSION: ${{ inputs.publish-tag }}
        run: |
          VERSION=${NEW_VERSION#v}
          sed -i "s/^version = .*/version = \"${VERSION}\"/" build.gradle.kts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push

      - name: Tag the version
        env:
          GIT_TAG: ${{ inputs.publish-tag }}
        run: |
          git tag "${GIT_TAG}"
          git push origin "${GIT_TAG}"

  # ── 3. Publish each platform's klib from its native host ────────────────────
  #
  # KMP requires each target's klib to be published from a compatible host.
  # The root "kotlin-multiplatform" metadata publication is published once
  # alongside the Linux artifact.
  publish-platform:
    name: Publish (${{ matrix.os }})
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: publishes linuxX64 klib + the root multiplatform metadata
          - os: ubuntu-latest
            publish-tasks: >-
              publishLinuxX64PublicationToMavenCentralRepository
              publishKotlinMultiplatformPublicationToMavenCentralRepository
          # macOS arm64: publishes macosArm64 klib
          - os: macos-15
            publish-tasks: publishMacosArm64PublicationToMavenCentralRepository
          # Windows: publishes mingwX64 klib
          - os: windows-latest
            publish-tasks: publishMingwX64PublicationToMavenCentralRepository
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish-tag }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Konan toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Install mingw C++20 toolchain (Windows)
        if: runner.os == 'Windows'
        run: C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-gcc

      - name: Publish to Maven Central
        run: gradle ${{ matrix.publish-tasks }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

  # ── 4. Create GitHub release ─────────────────────────────────────────────────
  github-release:
    name: Create GitHub release
    needs: publish-platform
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.publish-tag }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.publish-tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
