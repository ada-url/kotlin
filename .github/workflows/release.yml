name: Release

on:
  workflow_dispatch:
    inputs:
      publish-tag:
        description: 'The tag of the version to publish (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: release

jobs:
  test-release:
    name: Test release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test-task: linuxX64Test
          - os: macos-13
            test-task: macosX64Test
          - os: macos-14
            test-task: macosArm64Test
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Konan toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Build & Test
        run: gradle ${{ matrix.test-task }}

  publish-release:
    name: Publish release
    needs: test-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update version in build.gradle.kts
        env:
          NEW_VERSION: ${{ inputs.publish-tag }}
        run: |
          VERSION=${NEW_VERSION#v}
          sed -i "s/^version = .*/version = \"${VERSION}\"/" build.gradle.kts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push

      - name: Tag the version
        env:
          GIT_TAG: ${{ inputs.publish-tag }}
        run: |
          git tag "${GIT_TAG}"
          git push origin "${GIT_TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.publish-tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
