name: CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - '**/*.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check formatting (ktlint)
        run: gradle ktlintCheck

  test:
    name: Build & Test (${{ matrix.os }})
    needs: format
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test-task: linuxX64Test
            link-task: linkReleaseSharedLinuxX64
          - os: macos-15
            test-task: macosX64Test
            link-task: linkReleaseSharedMacosX64
          - os: macos-14
            test-task: macosArm64Test
            link-task: linkReleaseSharedMacosArm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Konan toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Run tests
        run: gradle ${{ matrix.test-task }}

      - name: Build shared library
        run: gradle ${{ matrix.link-task }}
