kotlin.code.style=official
# Suppress cinterop commonization warning (we share source sets across targets manually)
kotlin.mpp.enableCInteropCommonization.nowarn=true
# Suppress hierarchy template warning
kotlin.mpp.applyDefaultHierarchyTemplate=false
# Suppress "targets cannot be built on this machine" warning when building on Linux
kotlin.native.ignoreDisabledTargets=true
# Disable KN compiler cache on Linux.
# KN's cache links -Bstatic -lstdc++ from its GCC 8.3 sysroot, which lacks
# std::string cold-path symbols emitted by GCC 13+. With cache disabled these
# are instead resolved from string_compat.o which is included in libada.a.
kotlin.native.cacheKind.linuxX64=none
